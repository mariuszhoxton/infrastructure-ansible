server {
    listen 80;
    server_name localhost; # Tutaj później wpiszesz swoją domenę

    # Maksymalny rozmiar przesyłanego pliku (ważne przy zdjęciach produktów)
    client_max_body_size 64M;

    location / {
        # Przekierowanie ruchu do kontenera wordpress
        # Używamy nazwy usługi 'wordpress', bo Docker ma swój DNS
        proxy_pass http://wordpress:80;

        # Przekazywanie nagłówków (żeby Wordpress wiedział, kto go odwiedza)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Obsługa błędów
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
