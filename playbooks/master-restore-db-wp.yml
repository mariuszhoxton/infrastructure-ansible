---
- name: "[S1] Master Restore - Kompleksowe przywracanie (DB + Pliki)"
  hosts: ubuntu
  vars:
    project_path: "~/projects/moj-sklep"
    db_container: "shop_database"
    wp_container: "shop_frontend"
    local_backup_dir: "/home/Mariusz/backupy-projektow"

  tasks:
    # --- KROK 1: POBRANIE DATY Z ALMY ---
    - name: "1. [Local] Pobierz listę dostępnych dat z Almalinux"
      delegate_to: localhost
      become: no
      find:
        paths: "{{ local_backup_dir }}"
        patterns: "moj-sklep-db-*.sql"
      register: db_backups

    - name: "2. [Display] Dostępne backupy"
      debug:
        msg: "{{ item.path | basename | regex_replace('moj-sklep-db-', '') | regex_replace('.sql', '') }}"
      loop: "{{ db_backups.files | sort(attribute='mtime', reverse=true) }}"

    - name: "3. [Input] Podaj datę do przywrócenia"
      pause:
        prompt: "Wpisz wybraną datę (np. 2026-05-06_01-00)"
      register: selected_date

    # --- KROK 2: RESTORE BAZY (Z Twojego restore-database.yml) ---
    - name: "4. [DB] Kopiowanie pliku SQL na Ubuntu"
      copy:
        src: "{{ local_backup_dir }}/moj-sklep-db-{{ selected_date.user_input | trim }}.sql"
        dest: "{{ project_path }}/moj-sklep-db-{{ selected_date.user_input | trim }}.sql"

    - name: "5. [DB] Import bazy danych"
      shell: |
        docker exec -i {{ db_container }} sh -c \
        'mysql -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE' < {{ project_path }}/moj-sklep-db-{{ selected_date.user_input | trim }}.sql

    # --- KROK 3: RESTORE PLIKÓW (Z Twojego restore-wp-files.yml) ---
    - name: "6. [WP] Kopiowanie archiwum tar.gz na Ubuntu"
      copy:
        src: "{{ local_backup_dir }}/moj-sklep-files-{{ selected_date.user_input | trim }}.tar.gz"
        dest: "{{ project_path }}/moj-sklep-files-{{ selected_date.user_input | trim }}.tar.gz"

    - name: "7. [WP] Rozpakowanie w kontenerze"
      shell: |
        docker cp {{ project_path }}/moj-sklep-files-{{ selected_date.user_input | trim }}.tar.gz {{ wp_container }}:/tmp/
        docker exec -u root {{ wp_container }} sh -c \
        "tar -xzf /tmp/moj-sklep-files-{{ selected_date.user_input | trim }}.tar.gz -C /var/www/html/ && \
         chown -R www-data:www-data /var/www/html/"

    # --- KROK 4: SPRZĄTANIE I RESTART ---
    - name: "8. Sprzątanie plików tymczasowych na Ubuntu"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ project_path }}/moj-sklep-db-{{ selected_date.user_input | trim }}.sql"
        - "{{ project_path }}/moj-sklep-files-{{ selected_date.user_input | trim }}.tar.gz"

    - name: "9. Restart kontenerów"
      shell: "docker restart {{ wp_container }} shop_proxy"