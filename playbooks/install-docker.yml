---
- name: Instalacja oficjalnego silnika Docker na Ubuntu
  hosts: ubuntu_server
  become: yes

  tasks:
    - name: "1. Usunięcie starych lub nieoficjalnych wersji Dockera"
      apt:
        name: [docker, docker-engine, docker.io, containerd, runc]
        state: absent

    - name: "2. Instalacja pakietów wymaganych do dodania repozytorium"
      apt:
        name: [ca-certificates, curl, gnupg, lsb-release, python3-pip]
        state: present
        update_cache: yes

    - name: "3. Pobierz oficjalny klucz GPG Dockera"
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: "4. Dodanie oficjalnego repozytorium Docker do źródeł APT"
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: "5. Instalacja silnika Docker i wtyczki Compose"
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: "6. Upewnienie się, że usługa Docker działa i startuje z systemem"
      service:
        name: docker
        state: started
        enabled: yes

    - name: "7. Dodanie użytkownika {{ ansible_user }} do grupy docker"
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: "8. Resetowanie połączenia SSH, aby uprawnienia grupy zadziałały"
      meta: reset_connection
