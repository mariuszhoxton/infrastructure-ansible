---
- name: Automatyczne Odtwarzanie Plików WordPress
  hosts: ubuntu
  vars:
    project_path: "~/projects/moj-sklep"
    container_name: "shop_frontend"
    # Szukamy najnowszego archiwum na Almie
    backup_src: "{{ lookup('pipe', 'ls -t /home/Mariusz/backupy-projektow/*.tar.gz | head -1') }}"

  tasks:
    - name: 1. Kopiowanie archiwum na serwer Ubuntu
      copy:
        src: "{{ backup_src }}"
        dest: "{{ project_path }}/{{ backup_src | basename }}"
        mode: '0644'

    - name: 2. Przesłanie archiwum do wnętrza kontenera
      shell: "docker cp {{ project_path }}/{{ backup_src | basename }} {{ container_name }}:/tmp/"

    - name: 3. Rozpakowanie plików wewnątrz kontenera
      # Używamy -u root, bo tylko root może pisać w /var/www/html
      shell: |
        docker exec -u root {{ container_name }} sh -c \
        "tar -xzf /tmp/{{ backup_src | basename }} -C /var/www/html/"

    - name: 4. Naprawa uprawnień dla serwera WWW (www-data)
      # Dzięki temu WordPress "ożyje" i będzie mógł zapisywać pliki
      shell: "docker exec -u root {{ container_name }} chown -R www-data:www-data /var/www/html/"

    - name: 5. Wyświetlenie potwierdzenia
      debug:
        msg: "Pliki zostały odtworzone w {{ container_name }} z pliku {{ backup_src | basename }}"

    - name: 6. Sprzątanie tymczasowych plików
      shell: |
        rm {{ project_path }}/{{ backup_src | basename }}
        docker exec {{ container_name }} rm /tmp/{{ backup_src | basename }}