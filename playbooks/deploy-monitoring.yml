---
- name: "Deploy Monitoring (Netdata) - bezpośrednio na Ubuntu Server"
  hosts: ubuntu_server
  become: yes         # Przywracamy - dokładnie tak jak w playbooku sklepu
  vars_files:
    - ../vars/secrets.yml  # Wczytujemy Twoje zmienne bezpieczne

  vars:
    project_name: "monitoring"
    project_repo: "git@github.com:mariuszhoxton/monitoring-project.git"
    project_path: "/home/{{ ansible_user }}/projects/{{ project_name }}"

  tasks:
    - name: "1. Tworzenie folderu projektu na Ubuntu"
      ansible.builtin.file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"  # Zapewniamy, że Mariusz jest właścicielem katalogu
        group: "{{ ansible_user }}"

    - name: "2. Pobieranie kodu monitoringu z GitHuba na Ubuntu"
      ansible.builtin.git:
        repo: "{{ project_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes
        accept_hostkey: yes  # DOPISANE - automatycznie akceptuje klucz hosta GitHub
      become: no  # KLUCZOWE: Pobieranie z Gita wyłączamy z become, aby użyć klucza SSH Mariusza, a nie roota!

    - name: "3. Uruchomienie Netdata przez Docker Compose"
      ansible.builtin.shell:
        cmd: "docker compose up -d"
        chdir: "{{ project_path }}"

