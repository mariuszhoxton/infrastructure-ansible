---
- name: "Deploy Monitoring (Netdata) - bezpośrednio na Ubuntu Server"
  hosts: ubuntu_server
  become: yes         # Globalny root do operacji systemowych i sieciowych
  vars_files:
    - ../vars/secrets.yml

  vars:
    project_name: "monitoring"
    project_repo: "git@github.com:mariuszhoxton/monitoring-project.git"
    project_path: "/home/{{ ansible_user }}/projects/{{ project_name }}"
    global_net_name: "global_monitoring_net"

  tasks:
    - name: "1. Upewnij się, że globalna sieć monitoringu istnieje w systemie"
      community.docker.docker_network:
        name: "{{ global_net_name }}"
        state: present # Jeśli sieć istnieje, Ansible nic nie zrobi. Jeśli jej nie ma (pierwszy start), sam ją bezpiecznie utworzy.

    - name: "2. Tworzenie folderu projektu na Ubuntu"
      ansible.builtin.file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: "3. Pobieranie kodu monitoringu z GitHuba"
      ansible.builtin.git:
        repo: "{{ project_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes
        accept_hostkey: yes
      become: no  # Pobieranie jako Mariusz dla kluczy SSH

    - name: "4. Bezpieczne zatrzymanie i wyczyszczenie starych zasobów Netdata"
      community.docker.docker_compose_v2:
        project_src: "{{ project_path }}"
        state: absent
      failed_when: false # Ignoruje błąd przy pierwszym starcie, gdy nie ma jeszcze kontenerów

    - name: "5. Uruchomienie Netdata przez Docker Compose"
      community.docker.docker_compose_v2:
        project_src: "{{ project_path }}"
        state: present
        pull: missing # Pobiera obraz tylko wtedy, gdy go nie ma na dysku
      register: compose_result
