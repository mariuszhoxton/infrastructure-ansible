---
- name: "Deploy Monitoring (Netdata) - bezpośrednio na Ubuntu Server"
  hosts: ubuntu_server
  become: yes         # Globalny root dla zadań systemowych
  vars_files:
    - ../vars/secrets.yml  # Wczytujemy Twoje zmienne bezpieczne

  vars:
    project_name: "monitoring"
    project_repo: "git@github.com:mariuszhoxton/monitoring-project.git"
    project_path: "/home/{{ ansible_user }}/projects/{{ project_name }}"
    global_net_name: "global_monitoring_net"

  tasks:
    - name: "0. Tworzenie globalnej sieci monitoringu w Dockerze"
      ansible.builtin.shell:
        cmd: "docker network create {{ global_net_name }}"
      register: network_creation
      failed_when: false
      changed_when: "'already exists' not in network_creation.stderr and network_creation.rc == 0"

    - name: "1. Tworzenie folderu projektu na Ubuntu"
      ansible.builtin.file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"  # Zapewniamy, że Mariusz jest właścicielem katalogu
        group: "{{ ansible_user }}"

    - name: "2. Pobieranie kodu monitoringu z GitHuba na Ubuntu"
      ansible.builtin.git:
        repo: "{{ project_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes
        accept_hostkey: yes  # Automatycznie akceptuje klucz hosta GitHub
      become: no  # Pobieranie z Gita jako użytkownik Mariusz, a ne root

    - name: "3. Uruchomienie Netdata przez Docker Compose"
      ansible.builtin.shell:
        cmd: "docker compose up -d"
        chdir: "{{ project_path }}"
      become: no  # Mariusz jest w grupie docker, nie potrzebuje sudo


