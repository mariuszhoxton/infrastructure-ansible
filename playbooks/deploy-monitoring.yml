---
- name: "Deploy Monitoring (Netdata) - bezpośrednio na Ubuntu Server"
  hosts: ubuntu_server
  vars:
    # Gdzie na Ubuntu ma wylądować projekt. Dynamiczna ścieżka odporna na wielkość liter w nazwie użytkownika
    project_path: "/home/{{ ansible_env.HOME }}/projects/monitoring"
    # Adres repozytorium
    project_repo: "git@github.com:mariuszhoxton/monitoring-project.git" 

  tasks:
    - name: "1. Tworzenie folderu projektu na Ubuntu"
      file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'

    - name: "2. Pobieranie kodu monitoringu z GitHuba na Ubuntu"
      git:
        repo: "{{ project_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes

    - name: "3. Uruchomienie Netdata przez Docker Compose"
      community.docker.docker_compose_v2:
        project_src: "{{ project_path }}"
        state: present
